# Pivot production frontend — nginx serving the built SPA + reverse-proxying /api.
# Listens on 3000 to match the dev Vite server, so Caddy's reverse_proxy target
# (127.0.0.1:3000) is identical in dev and prod.

# Resolve the backend hostname at request time (not at config load). nginx
# resolves a bare `proxy_pass http://backend` once during startup and refuses to
# start if the name isn't resolvable yet — which breaks startup ordering and any
# later backend restart. Routing through a variable + an explicit resolver makes
# resolution lazy and per-request, so nginx always starts and follows DNS
# changes. 127.0.0.11 is the container-runtime DNS (Docker/Podman embed it).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: any path that isn't a real file falls back to the SPA
    # entry, letting react-router handle the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — including SSE streaming endpoints under /api/.../stream — proxied to
    # the backend container. No trailing slash on proxy_pass so the /api prefix is
    # preserved (backend mounts its routers with prefix="/api").
    #
    # proxy_buffering off is essential: the chat runtime streams tokens over SSE
    # and they must reach the browser immediately, not be buffered by nginx.
    location /api/ {
        set $backend_upstream http://backend:8003;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly: no buffering, keep connections alive for long streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
