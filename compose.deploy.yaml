# =============================================================================
# Pivot — Cloud Deploy Overrides (Linux host)
# Applied on top of compose.yaml:
#   podman compose -f compose.yaml -f compose.deploy.yaml up -d --build
#
# What this changes vs the default dev compose:
#   - restart: unless-stopped on every runtime service (belt-and-suspenders
#     alongside the systemd unit that owns the whole stack).
#   - Shrinks the warm sandbox pool for a 7 GB host so on-demand agent
#     sandboxes cannot OOM the box (default pool=8 × 1g would exceed RAM).
# =============================================================================

services:
  backend:
    restart: unless-stopped
    environment:
      # Production runs in production mode (drops dev conveniences) and MUST be
      # given an explicit token-signing key + sandbox-manager token. All three
      # resolve from the deploy host's gitignored .env: ${VAR:?...} makes compose
      # itself abort if either secret is unset, and the backend additionally
      # refuses to start on the public default key — so a misconfigured deploy
      # can never silently fall back to forging-attackable credentials.
      - ENV=production
      - SECRET_KEY=${PIVOT_SECRET_KEY:?set PIVOT_SECRET_KEY in the deploy host .env}
      - SANDBOX_MANAGER_TOKEN=${PIVOT_SANDBOX_TOKEN:?set PIVOT_SANDBOX_TOKEN in the deploy host .env}

  frontend:
    restart: unless-stopped
    environment:
      # Public hostname the Vite dev server must accept (DNS-rebinding guard).
      # Set PIVOT_PUBLIC_HOST in the deploy host's (gitignored) .env file.
      # Dev (compose.yaml) leaves it unset → localhost-only default.
      - VITE_ALLOWED_HOSTS=${PIVOT_PUBLIC_HOST}

  sandbox-manager:
    restart: unless-stopped
    environment:
      # 7 GB host: keep at most 2 warm sandboxes, each capped at 768 MB.
      # Idle sandboxes are still reaped after SANDBOX_POOL_IDLE_TTL_SECONDS.
      - SANDBOX_POOL_MAX_SIZE=2
      - SANDBOX_MEMORY_LIMIT=768m
      - SANDBOX_MANAGER_TOKEN=${PIVOT_SANDBOX_TOKEN:?set PIVOT_SANDBOX_TOKEN in the deploy host .env}

  sandbox-base:
    # podman-compose enforces depends_on strictly; sandbox-base exits right after
    # building (command "true"), which would leave sandbox-manager/backend blocked
    # on an "improper" (exited) dependency. Keep it alive in prod so the dependency
    # graph stays valid. (dev uses docker-compose, which honours service_started
    # without needing the dependency to remain running.)
    restart: unless-stopped
    command: ["sleep", "infinity"]
