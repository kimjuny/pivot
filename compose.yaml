# =============================================================================
# Pivot — Dev Compose
# Strategy: mount source code, pre-install deps in image, hot-reload both ends
# Usage:    podman compose up --build
# =============================================================================

services:
  # ---------- Sandbox base image (one-shot builder for per-agent containers) ----------
  sandbox-base:
    image: localhost/pivot-sandbox-base:py311-rg
    build:
      context: .
      dockerfile: Containerfile.dev
      target: sandbox-base
    container_name: pivot-sandbox-base-builder
    restart: "no"
    command: >
      python -c "print('sandbox base image is ready')"

  # ---------- Backend (FastAPI + Uvicorn, non-privileged) ----------
  backend:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: backend-dev
    container_name: pivot-backend
    ports:
      - "8003:8003"
    privileged: false
    volumes:
      - ./server:/app/server:z
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./poetry.lock:/app/poetry.lock:ro
      - ./server/data:/app/server/data:z
      # Why: `/tmp/pivot-seaweedfs-posix` resolves inside the Podman VM on
      # macOS and directly on the host on Linux, which gives one cleaner
      # default bridge path than host-specific home-directory mounts.
      - ${PIVOT_EXTERNAL_POSIX_ROOT:-/tmp/pivot-seaweedfs-posix}:/app/server/external-posix:z
    environment:
      - DATABASE_URL=sqlite:////app/server/data/pivot.db
      - ENV=development
      - PYTHONUNBUFFERED=1
      - SANDBOX_MANAGER_URL=http://sandbox-manager:8051
      - SANDBOX_MANAGER_TOKEN=dev-sandbox-token
      - SANDBOX_MANAGER_TIMEOUT_SECONDS=30
      - STORAGE_PROFILE=${STORAGE_PROFILE:-auto}
      - LOCAL_CACHE_ROOT=${LOCAL_CACHE_ROOT:-/app/server/data/.local_cache}
      - STORAGE_SEAWEEDFS_FILER_ENDPOINT=${STORAGE_SEAWEEDFS_FILER_ENDPOINT:-http://seaweedfs:8888}
      - STORAGE_SEAWEEDFS_POSIX_ROOT=${STORAGE_SEAWEEDFS_POSIX_ROOT:-/app/server/external-posix}
      - STORAGE_SEAWEEDFS_HOST_POSIX_ROOT=${STORAGE_SEAWEEDFS_HOST_POSIX_ROOT:-/tmp/pivot-seaweedfs-posix}
    depends_on:
      - sandbox-manager
    command: >
      poetry run python -m uvicorn app.main:app
      --reload
      --reload-dir server/app
      --timeout-graceful-shutdown 3
      --host 0.0.0.0
      --port 8003
      --app-dir server

  # ---------- Sandbox Manager (privileged, Podman API owner) ----------
  sandbox-manager:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: backend-dev
    container_name: pivot-sandbox-manager
    privileged: true
    volumes:
      # macOS podman-machine: /var/run/docker.sock usually points to Podman API.
      # Linux users can override with: /run/podman/podman.sock:/run/podman/podman.sock
      - /var/run/docker.sock:/run/podman/podman.sock
      - ./server:/app/server:z
      # Why: sandbox-manager must resolve the same external POSIX bridge that
      # backend exposes, otherwise backend-visible workspace paths cannot be
      # translated back to one host-visible mount source for sandbox bind-mounts.
      - ${PIVOT_EXTERNAL_POSIX_ROOT:-/tmp/pivot-seaweedfs-posix}:/app/server/external-posix:z
    environment:
      - SANDBOX_MANAGER_TOKEN=dev-sandbox-token
      - SANDBOX_PODMAN_BASE_URL=unix:///run/podman/podman.sock
      - SANDBOX_BASE_IMAGE=localhost/pivot-sandbox-base:py311-rg
      - SANDBOX_NETWORK_MODE=bridge
      - SANDBOX_BACKEND_CONTAINER_NAME=pivot-backend
      - SANDBOX_BACKEND_WORKSPACE_ROOT=${SANDBOX_BACKEND_WORKSPACE_ROOT:-/app/server/workspace}
      - SANDBOX_EXTERNAL_POSIX_ROOT=${SANDBOX_EXTERNAL_POSIX_ROOT:-/app/server/external-posix}
      - SANDBOX_CONTAINER_PREFIX=pivot-sandbox
      - SANDBOX_DEFAULT_TIMEOUT_SECONDS=30
      # Do not pin SANDBOX_WORKSPACE_HOST_ROOT with ${PWD}; it is shell-cwd dependent
      # and may incorrectly resolve to ".../web/server/workspace". Let sandbox-manager
      # discover the workspace host root from backend container mounts.
      # Pooling: keep the warm pool small so stale browser-heavy sandboxes do
      # not quietly exhaust the Podman VM between active sessions.
      - SANDBOX_POOL_SCAN_INTERVAL_SECONDS=30
      - SANDBOX_POOL_IDLE_TTL_SECONDS=900
      - SANDBOX_POOL_MAX_SIZE=8
      # Bound each warm sandbox so one runaway browser/process tree cannot
      # monopolize the shared Podman VM.
      - SANDBOX_MEMORY_LIMIT=1g
      - SANDBOX_CPU_LIMIT=1.0
      - SANDBOX_PIDS_LIMIT=256
    depends_on:
      sandbox-base:
        condition: service_completed_successfully
    command: >
      poetry run python -m uvicorn server.sandbox_manager.main:app
      --reload
      --reload-dir /app/server/sandbox_manager
      --no-access-log
      --host 0.0.0.0
      --port 8051
      --app-dir /app

  # ---------- Frontend (Vite dev server, non-privileged) ----------
  frontend:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: frontend-dev
    container_name: pivot-frontend
    ports:
      - "3000:3000"
    privileged: false
    volumes:
      - ./web/package.json:/app/web/package.json:z
      - ./web/package-lock.json:/app/web/package-lock.json:z
      - ./web/src:/app/web/src:z
      - ./web/public:/app/web/public:z
      - ./web/scripts:/app/web/scripts:z
      - ./web/index.html:/app/web/index.html:ro
      - ./web/vite.config.ts:/app/web/vite.config.ts:ro
      - ./web/tailwind.config.js:/app/web/tailwind.config.js:ro
      - ./web/postcss.config.js:/app/web/postcss.config.js:ro
      - ./web/tsconfig.json:/app/web/tsconfig.json:ro
      - ./web/tsconfig.node.json:/app/web/tsconfig.node.json:ro
      - ./web/eslint.config.js:/app/web/eslint.config.js:ro
      - ./web/components.json:/app/web/components.json:ro
    environment:
      - BACKEND_URL=http://backend:8003
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  # ---------- External SeaweedFS (optional profile) ----------
  seaweedfs:
    image: chrislusf/seaweedfs:4.06
    container_name: pivot-seaweedfs
    user: "0:0"
    profiles:
      - seaweedfs
    ports:
      - "8333:8333"
      - "8888:8888"
      - "18888:18888"
    volumes:
      - seaweedfs-data:/data
    command:
      - mini
      - -dir=/data
      # Why: fs-up mounts from the Podman VM host, not from inside the
      # container network. Advertising loopback keeps the filer's grpc address
      # aligned with the published host ports instead of leaking an internal
      # bridge IP into mount clients.
      - -ip=127.0.0.1
      - -ip.bind=0.0.0.0
      - -filer.port.grpc=18888

volumes:
  seaweedfs-data:
