# =============================================================================
# Pivot — Dev Compose
# Strategy: mount source code, pre-install deps in image, hot-reload both ends
# Usage:    podman compose up --build
# =============================================================================

services:
  # ---------- Backend (FastAPI + Uvicorn, non-privileged) ----------
  backend:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: backend-dev
    container_name: pivot-backend
    ports:
      - "8003:8003"
    privileged: false
    volumes:
      - ./server:/app/server:z
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./poetry.lock:/app/poetry.lock:ro
      - pivot-data:/app/server/data
    environment:
      - DATABASE_URL=sqlite:////app/server/data/pivot.db
      - ENV=development
      - PYTHONUNBUFFERED=1
      - SANDBOX_MANAGER_URL=http://sandbox-manager:8051
      - SANDBOX_MANAGER_TOKEN=dev-sandbox-token
      - SANDBOX_MANAGER_TIMEOUT_SECONDS=30
    depends_on:
      - sandbox-manager
    command: >
      poetry run python -m uvicorn app.main:app
      --reload
      --reload-dir server/app
      --host 0.0.0.0
      --port 8003
      --app-dir server

  # ---------- Sandbox Manager (privileged, Podman API owner) ----------
  sandbox-manager:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: backend-dev
    container_name: pivot-sandbox-manager
    privileged: true
    volumes:
      # macOS podman-machine: /var/run/docker.sock usually points to Podman API.
      # Linux users can override with: /run/podman/podman.sock:/run/podman/podman.sock
      - /var/run/docker.sock:/run/podman/podman.sock
      - ./server:/app/server:z
    environment:
      - SANDBOX_MANAGER_TOKEN=dev-sandbox-token
      - SANDBOX_PODMAN_BASE_URL=unix:///run/podman/podman.sock
      - SANDBOX_BASE_IMAGE=docker.io/library/python:3.10-slim
      - SANDBOX_BACKEND_CONTAINER_NAME=pivot-backend
      - SANDBOX_CONTAINER_PREFIX=pivot-sandbox
      - SANDBOX_DEFAULT_TIMEOUT_SECONDS=30
      # Explicit host-side workspace root avoids inspect-format differences.
      - SANDBOX_WORKSPACE_HOST_ROOT=${PWD}/server/workspace
      # Pooling: timeout cleanup + LRU cap fallback.
      - SANDBOX_POOL_SCAN_INTERVAL_SECONDS=30
      - SANDBOX_POOL_IDLE_TTL_SECONDS=300
      - SANDBOX_POOL_MAX_SIZE=100
    command: >
      poetry run python -m uvicorn server.sandbox_manager.main:app
      --reload
      --reload-dir /app/server/sandbox_manager
      --no-access-log
      --host 0.0.0.0
      --port 8051
      --app-dir /app

  # ---------- Frontend (Vite dev server, non-privileged) ----------
  frontend:
    build:
      context: .
      dockerfile: Containerfile.dev
      target: frontend-dev
    container_name: pivot-frontend
    ports:
      - "3000:3000"
    privileged: false
    volumes:
      - ./web/src:/app/web/src:z
      - ./web/public:/app/web/public:z
      - ./web/index.html:/app/web/index.html:ro
      - ./web/vite.config.ts:/app/web/vite.config.ts:ro
      - ./web/tailwind.config.js:/app/web/tailwind.config.js:ro
      - ./web/postcss.config.js:/app/web/postcss.config.js:ro
      - ./web/tsconfig.json:/app/web/tsconfig.json:ro
      - ./web/tsconfig.node.json:/app/web/tsconfig.node.json:ro
      - ./web/eslint.config.js:/app/web/eslint.config.js:ro
      - ./web/components.json:/app/web/components.json:ro
    environment:
      - BACKEND_URL=http://backend:8003
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pivot-data:
